# Alembic Configuration File

[alembic]
script_location = alembic
prepend_sys_path = .
# NOTE: This URL is overridden in alembic/env.py from app.config.settings
sqlalchemy.url = sqlite+aiosqlite:///./expert_room.db

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ${ruff_executable:ruff}
ruff.options = format --target-version py312 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
